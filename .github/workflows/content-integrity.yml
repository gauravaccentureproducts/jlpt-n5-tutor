name: content-integrity

# Runs the 18 content invariants from feedback/ui-testing-plan.md §12.1.
#
# CURRENT MODE: advisory (continue-on-error: true). The script surfaces
# 406 pre-existing findings that need triage in the next quarterly
# Pass-N audit; we don't want every push to fail until those are
# resolved. Once the audit closes them out, flip continue-on-error to
# false so this becomes a hard release blocker.
#
# Manual run:
#   python tools/check_content_integrity.py            # short summary
#   python tools/check_content_integrity.py -v         # full violation list

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run content integrity checks (advisory)
        continue-on-error: true
        run: |
          python tools/check_content_integrity.py -v
        env:
          PYTHONIOENCODING: utf-8

      - name: Run hard subset (release blockers)
        # These four invariants have no false positives and ARE wired
        # to fail the build. The other 14 stay advisory until the
        # quarterly audit closes the existing findings.
        run: |
          python -c "
          from tools.check_content_integrity import (
              check_x_6_5_no_em_dashes,
              check_x_6_6_ru_verb_flags,
              check_x_6_9_furigana_primary_reading_sanity,
              check_ja_9_engine_display_contract,
          )
          failures = []
          for name, fn in [
              ('X-6.5 No em-dashes', check_x_6_5_no_em_dashes),
              ('X-6.6 Ru-verb exception flags', check_x_6_6_ru_verb_flags),
              ('X-6.9 Primary-reading sanity', check_x_6_9_furigana_primary_reading_sanity),
              ('JA-9 Engine-display contract', check_ja_9_engine_display_contract),
          ]:
              fs = fn()
              if fs:
                  failures.append((name, fs))
                  print(f'FAIL  {name}')
                  for f in fs[:5]:
                      print(f'  - {f}')
              else:
                  print(f'PASS  {name}')
          import sys
          sys.exit(1 if failures else 0)
          "
        env:
          PYTHONIOENCODING: utf-8
