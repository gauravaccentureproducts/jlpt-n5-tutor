name: playwright-p0-smoke

# P0 smoke suite from feedback/ui-testing-plan.md §17.1.
# Runs ~15 tests across 2 device profiles (Desktop Chrome + Pixel 5
# mobile) with axe-core a11y scans on the 6 highest-traffic routes.
# Total time budget: ~2 min on CI.
#
# Local run:
#   npm install
#   npm run test:install-browsers
#   npm run test:smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python (for the static webServer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node deps
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run P0 smoke
        # Visual-regression suite is excluded from the default CI run —
        # it requires committed baselines (tests/__screenshots__/) to
        # work, and the suite was scaffolded under DEFER-6 without an
        # initial baseline-approval round. To enable: capture baselines
        # via `npx playwright test visual-regression --update-snapshots`
        # locally, commit the .png files, then drop --grep-invert here.
        run: npx playwright test --grep-invert visual-regression
        env:
          CI: '1'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces for failed tests
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
