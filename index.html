<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JLPT N5 Grammar Tutor</title>
  <meta name="description" content="Static, on-device, privacy-preserving tutor for JLPT N5 grammar.">
  <meta name="theme-color" content="#14452a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <a href="#app" class="skip-link">Skip to main content</a>
  <header class="app-header" role="banner">
    <div class="brand">
      <h1>JLPT N5 Grammar Tutor</h1>
      <p class="tagline">Learn. Test. Review. Master.</p>
    </div>
    <nav class="primary-nav" aria-label="Primary">
      <a href="#/learn" data-route="learn">Learn</a>
      <a href="#/test" data-route="test">Test</a>
      <a href="#/drill" data-route="drill">
        Daily Drill<span id="drill-badge" class="badge" hidden aria-label="patterns due"></span>
      </a>
      <a href="#/review" data-route="review">Review</a>
      <a href="#/summary" data-route="summary">Summary</a>
      <a href="#/settings" data-route="settings" aria-label="Settings">⚙</a>
    </nav>
    <div class="settings">
      <label class="furigana-toggle">
        <input type="checkbox" id="furigana-toggle">
        <span>Show furigana on N5 kanji</span>
      </label>
    </div>
  </header>

  <main id="app" role="main">
    <p class="loading">Loading...</p>
  </main>

  <footer class="app-footer">
    <small>Static app. Runs from any browser. No data leaves this device.</small>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker for offline capability. Only runs on http(s) -
    // not when opening index.html directly via file://.
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
