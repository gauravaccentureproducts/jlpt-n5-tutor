<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JLPT N5 Grammar Tutor</title>
  <meta name="description" content="Static, on-device, privacy-preserving tutor for JLPT N5 grammar.">
  <meta name="theme-color" content="#14452a">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://gauravaccentureproducts.github.io/jlpt-n5-tutor/">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <a href="#app" class="skip-link">Skip to main content</a>
  <header class="app-header" role="banner">
    <div class="brand">
      <h1><a href="#/home" class="brand-link" aria-label="JLPT N5 Grammar Tutor - return to home">JLPT N5 Grammar Tutor</a></h1>
    </div>
    <nav class="primary-nav" aria-label="Primary">
      <a href="#/learn" data-route="learn">Learn</a>
      <a href="#/drill" data-route="drill">
        Practice<span id="drill-badge" class="badge" hidden aria-label="patterns due"></span>
      </a>
      <a href="#/review" data-route="review">Review</a>
      <a href="#/test" data-route="test">Test</a>
    </nav>
    <nav class="secondary-nav" aria-label="Secondary">
      <input type="search" id="search-input" placeholder="Search…" aria-label="Search grammar / vocab / kanji" autocomplete="off">
      <a href="#/summary" data-route="summary" class="secondary-nav-link">Summary</a>
      <a href="#/settings" data-route="settings" class="secondary-nav-link" aria-label="Settings">⚙</a>
    </nav>
  </header>


  <main id="app" role="main">
    <div class="skeleton-wrap" role="status" aria-live="polite" aria-label="Loading">
      <div class="skeleton skeleton-title" aria-hidden="true"></div>
      <div class="skeleton skeleton-card" aria-hidden="true"></div>
      <div class="skeleton skeleton-row" aria-hidden="true"></div>
      <div class="skeleton skeleton-row" aria-hidden="true"></div>
      <div class="skeleton skeleton-row" aria-hidden="true"></div>
    </div>
  </main>

  <footer class="app-footer">
    <small>Works offline · No login · Progress stays on device · v1.5.0 · <a href="CHANGELOG.md">What's new</a></small>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker for offline capability. Only runs on http(s) -
    // not when opening index.html directly via file://.
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
