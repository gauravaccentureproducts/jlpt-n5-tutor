<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- CSP: static-only, no third-party. 'unsafe-inline' on style is needed for
       the inline <style> block in the SW-update toast and a11y overrides;
       script-src omits 'unsafe-inline' so any future inline-script regression
       fails fast. Per OQ-3 in spec supplement §B.9. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'none';">
  <title>JLPT N5</title>
  <meta name="description" content="JLPT N5 study material covering grammar, vocabulary, kanji, reading and listening.">
  <meta name="theme-color" content="#14452a">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://gauravaccentureproducts.github.io/jlpt-n5-tutor/">
  <!-- Inline SVG favicon. Without this, modern browsers fall back to
       `/favicon.ico` at the GitHub-Pages USER root (not the project root)
       and log a 404 in the console. CSP allows `img-src data:` so the
       data URI loads. Same N5 mark as the PWA manifest icon. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%2314452a'/><text x='50%25' y='58%25' text-anchor='middle' font-family='sans-serif' font-size='110' font-weight='700' fill='white'>N5</text></svg>">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- Preload the two most-used fonts so first paint isn't a system-font
       flash. Inter Regular (latin body) + Noto Sans JP (every ja example).
       Light + Medium load on demand via the @font-face fallback chain. -->
  <link rel="preload" href="fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/noto-sans-jp-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/main.css?v=1.11.23">
</head>
<body>
  <a href="#app" class="skip-link">Skip to main content</a>
  <header class="app-header" role="banner">
    <div class="brand">
      <!-- Brand-link routes to the level picker (Level 1). Inside an
           N5 context the visible label still says "JLPT N5" because
           the user IS on N5; clicking returns them to the level
           chooser to pick another level. -->
      <h1><a href="#/levels" class="brand-link" aria-label="JLPT, choose a level">JLPT N5</a></h1>
    </div>
    <nav class="primary-nav" aria-label="Primary">
      <a href="#/learn/grammar" data-route="learn/grammar">Grammar</a>
      <a href="#/learn/vocab" data-route="learn/vocab">Vocabulary</a>
      <a href="#/kanji" data-route="kanji">Kanji</a>
      <a href="#/reading" data-route="reading">Reading</a>
      <a href="#/listening" data-route="listening">Listening</a>
      <a href="#/test" data-route="test">Test</a>
      <a href="#/summary" data-route="summary">Progress</a>
    </nav>
    <nav class="secondary-nav" aria-label="Secondary">
      <input type="search" id="search-input" placeholder="Search" aria-label="Search grammar / vocab / kanji" autocomplete="off">
      <button type="button" id="fullscreen-toggle" class="icon-btn" aria-label="Toggle fullscreen" title="Toggle fullscreen">
        <!-- lucide-style maximize icon (4 corner brackets). aria-hidden on the
             SVG itself; the button carries the accessible name. -->
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" width="18" height="18">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
          <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
          <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
      <a href="#/settings" data-route="settings" class="icon-btn" aria-label="Settings" title="Settings">
        <!-- lucide-style settings cog icon. -->
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" width="18" height="18">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </a>
    </nav>
  </header>


  <main id="app" role="main">
    <div class="skeleton-wrap" role="status" aria-live="polite" aria-label="Loading">
      <div class="skeleton skeleton-title" aria-hidden="true"></div>
      <div class="skeleton skeleton-tagline" aria-hidden="true"></div>
      <div class="skeleton-ctas" aria-hidden="true">
        <div class="skeleton skeleton-btn"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
      <div class="skeleton-pillars" aria-hidden="true">
        <div class="skeleton skeleton-pillar"></div>
        <div class="skeleton skeleton-pillar"></div>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <small class="footer-meta">v1.10.2</small>
    <nav class="footer-nav" aria-label="Footer">
      <a href="#/changelog" data-route="changelog">What's new</a>
      <a href="PRIVACY.md">Privacy</a>
      <a href="#/feedback" data-route="feedback">Feedback</a>
    </nav>
  </footer>

  <script type="module" src="js/app.js?v=1.11.23"></script>
</body>
</html>
